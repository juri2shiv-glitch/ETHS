name: Fetch KoboToolbox Data

on:
  schedule:
    - cron: '*/30 * * * *'   # runs every 30 minutes automatically
  workflow_dispatch:           # allows manual run from GitHub Actions tab

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch data from KoboToolbox and save
        run: |
          mkdir -p data

          curl -s \
            -H "Authorization: Token 376644ab507d99d198c5aadb70cc1052d58c3ff8" \
            "https://kf.kobotoolbox.org/api/v2/assets/aaHKcisJXEqPH2xkEa3XkS/data/?format=json&limit=3000" \
            -o data/kobo_latest.json

          # Verify the file is valid JSON and print record count
          python3 -c "
          import json
          with open('data/kobo_latest.json') as f:
              data = json.load(f)
          count = len(data.get('results', []))
          print(f'Fetched {count} records from KoboToolbox')
          "

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kobo_latest.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "data: update kobo_latest.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
